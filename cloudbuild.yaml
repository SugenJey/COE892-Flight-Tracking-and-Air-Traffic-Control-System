# One-time GCP setup (run manually in Cloud Shell before first deploy):
#
#   gcloud tasks queues create atc-events \
#       --location=northamerica-northeast2
#
#   gcloud run services add-iam-policy-binding airports \
#       --member="serviceAccount:${PROJECT_NUMBER}-compute@developer.gserviceaccount.com" \
#       --role=roles/run.invoker \
#       --region=northamerica-northeast2
#
# Cloud Build trigger substitution variables required:
#   _DB_USER, _DB_PASS, _DB_NAME, _INSTANCE_CONNECTION_NAME
#   _GOOGLE_CLOUD_PROJECT   e.g. my-gcp-project-id
#   _SERVICE_URL            e.g. https://airports-xxxx-pd.a.run.app
#   _SA_EMAIL               e.g. 123456-compute@developer.gserviceaccount.com

steps:
  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - airports
      - --source=.
      - --region=northamerica-northeast2
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --timeout=300s
      - --clear-base-image
      - --add-cloudsql-instances=${_INSTANCE_CONNECTION_NAME}
      - --set-env-vars=DB_USER=${_DB_USER},DB_PASS=${_DB_PASS},DB_NAME=${_DB_NAME},INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION_NAME},GOOGLE_CLOUD_PROJECT=${_GOOGLE_CLOUD_PROJECT},CLOUD_TASKS_LOCATION=northamerica-northeast2,CLOUD_TASKS_QUEUE=atc-events,SERVICE_URL=${_SERVICE_URL},SA_EMAIL=${_SA_EMAIL}

options:
  logging: CLOUD_LOGGING_ONLY
