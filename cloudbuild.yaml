steps:
  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - airports
      - --source=.
      - --region=northamerica-northeast2
      - --entry-point=time_http
      - --add-cloudsql-instances=${_INSTANCE_CONNECTION_NAME}
      - --set-env-vars=DB_USER=${_DB_USER},DB_PASS=${_DB_PASS},DB_NAME=${_DB_NAME},INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION_NAME}

options:
  logging: CLOUD_LOGGING_ONLY